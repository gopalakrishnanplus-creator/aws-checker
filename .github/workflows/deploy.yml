name: Deploy AWS Checker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aws-checker-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -euo pipefail

            APP_DIR=/var/www/aws-checker
            BRANCH=main
            SHARED_VENV_DIR=/var/www/venv
            VENV_PYTHON="$SHARED_VENV_DIR/bin/python"

            if [ ! -d "$APP_DIR" ]; then
              echo "Application directory not found: $APP_DIR" >&2
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Git repository not found in $APP_DIR" >&2
              exit 1
            fi

            cd "$APP_DIR"

            if [ -f "$APP_DIR/.env" ]; then
              set -a
              . "$APP_DIR/.env"
              set +a
            fi

            git checkout "$BRANCH"
            git pull origin "$BRANCH"

            if [ ! -x "$VENV_PYTHON" ]; then
              echo "Could not find Python in shared virtualenv: $VENV_PYTHON" >&2
              exit 1
            fi

            "$VENV_PYTHON" -m pip install -r requirements.txt
            "$VENV_PYTHON" manage.py migrate --noinput
            "$VENV_PYTHON" manage.py sync_seed_data
            "$VENV_PYTHON" manage.py shell -c "from checker.models import ManagedResource; print({'total': ManagedResource.objects.count(), 'ec2': ManagedResource.objects.filter(service_type='ec2').count(), 'rds': ManagedResource.objects.filter(service_type='rds').count(), 's3': ManagedResource.objects.filter(service_type='s3').count()})"
            "$VENV_PYTHON" manage.py collectstatic --noinput
            "$VENV_PYTHON" manage.py check

            sudo systemctl restart aws_checker
            sudo systemctl status aws_checker --no-pager
